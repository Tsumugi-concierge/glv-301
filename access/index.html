<title>Route to Accommodations — GLV 301</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #f0824a;
    --accent-light: #fad4be;
    --cream: #fdf6ee;
    --text-dark: #3a3232;
    --text-mid: #6b5a5a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }
  .top-bar {
    background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 70%, black) 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .back-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    color: #fff;
    text-decoration: none;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.4); }
  .top-title {
    font-family: 'Pacifico', cursive;
    font-size: 1.3rem;
    color: #fff;
    text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
    flex: 1;
  }
  .top-emoji { font-size: 1.8rem; }
  .content { padding: 20px 16px 40px; max-width: 640px; margin: 0 auto; }
  .content img:last-child { margin-bottom: 0; }
  .back-footer {
    text-align: center;
    margin-top: 28px;
    padding-bottom: 20px;
  }
  .back-footer a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-weight: 700;
    font-size: 1rem;
    text-decoration: none;
    background: var(--accent-light);
    padding: 12px 24px;
    border-radius: 50px;
    transition: opacity 0.2s;
  }
  .back-footer a:hover { opacity: 0.8; }

  /* lang-bar */
  .lang-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    flex-wrap: wrap;
    background: var(--cream);
  }
  .lang-btn {
    border: 2px solid var(--accent-light);
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    border-radius: 50px;
    padding: 4px 9px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(120,80,60,0.12);
  }
  .lang-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .lang-btn:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
    <link rel="stylesheet" href="../assets/style-sub.css">
</head>

  ja: { pageTitle: '宿泊施設へのルート', imgAlt: '宿泊施設へのルート', backToMenu: '← メニューへ戻る' },
  zh: { pageTitle: '前往住宿的路线', imgAlt: '前往住宿的路线', backToMenu: '← 返回菜单' },
  ko: { pageTitle: '숙소까지 가는 길', imgAlt: '숙소까지 가는 길', backToMenu: '← 메뉴로 돌아가기' },
  fr: { pageTitle: "Itinéraire vers l'hébergement", imgAlt: "Itinéraire vers l'hébergement", backToMenu: '← Retour au menu' },
  es: { pageTitle: 'Ruta al alojamiento', imgAlt: 'Ruta al alojamiento', backToMenu: '← Volver al menú' },
};
function applyTranslations(lang) {
  const t = UI_STRINGS[lang];
  if (!t) return;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (key in t) el.textContent = t[key];
  });
  document.querySelectorAll('[data-i18n-alt]').forEach(el => {
    const key = el.getAttribute('data-i18n-alt');
    if (key in t) el.alt = t[key];
  });
}
function setLang(lang, btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyTranslations(lang);
}
applyTranslations('en');
</script>
</body>
