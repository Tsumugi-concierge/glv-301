<style>
  :root {
    --accent: #c03840;
    --accent-light: #f0c0c0;
    --cream: #f4f7fa;
    --text-dark: #2c3440;
    --text-mid: #566374;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }
  .top-bar {
    background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 70%, black) 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .back-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    color: #fff;
    text-decoration: none;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.4); }
  .top-title {
    font-family: 'Pacifico', cursive;
    font-size: 1.3rem;
    color: #fff;
    text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
    flex: 1;
  }
  .top-emoji { font-size: 1.8rem; }
  .content { padding: 20px 16px 40px; max-width: 600px; margin: 0 auto; }
  .content img:last-child { margin-bottom: 0; }
  .back-footer {
    text-align: center;
    margin-top: 28px;
    padding-bottom: 20px;
  }
  .back-footer a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-weight: 700;
    font-size: 1rem;
    text-decoration: none;
    background: var(--accent-light);
    padding: 12px 24px;
    border-radius: 50px;
    transition: opacity 0.2s;
  }
  .back-footer a:hover { opacity: 0.8; }
</style>
